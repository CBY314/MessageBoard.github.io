<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f0f4f8;padding:30px;}
        .container{max-width:700px;margin:0 auto;}
        h1{text-align:center;margin-bottom:30px;color:#222;}

        .login-box{
            background:#fff;padding:30px;border-radius:10px;
            box-shadow:0 2px 8px #ccc;margin:50px auto;max-width:400px;
        }
        .login-box input{
            width:100%;padding:12px;margin:10px 0;
            border:1px solid #ddd;border-radius:6px;font-size:16px;
        }
        .login-box button{
            width:100%;padding:12px;background:#409eff;
            color:#fff;border:none;border-radius:6px;cursor:pointer;
        }

        .wall-wrap{display:none;}
        .logout-btn{
            padding:8px 20px;background:#f56c6c;color:#fff;
            border:none;border-radius:6px;cursor:pointer;margin-bottom:20px;
        }

        .admin-panel{
            background:#fff;padding:20px;border-radius:10px;
            box-shadow:0 2px 8px #ccc;margin-bottom:20px;display:none;
        }
        .admin-panel input{padding:8px;margin:5px;border:1px solid #ddd;border-radius:4px;}
        .admin-panel button{padding:8px 12px;background:#67c23a;color:#fff;border:none;border-radius:4px;cursor:pointer;margin:5px;}
        .admin-del{background:#f56c6c !important;}
        .user-item{padding:10px;background:#f8f9fa;margin:6px 0;border-radius:4px;display:flex;justify-content:space-between;}

        .input-box{
            background:#fff;padding:20px;border-radius:10px;
            box-shadow:0 2px 8px #ccc;margin-bottom:20px;
        }
        textarea{
            width:100%;height:100px;padding:15px;
            border:1px solid #ddd;border-radius:6px;resize:none;font-size:16px;
        }
        .send-btn{
            margin-top:15px;padding:10px 30px;
            background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;
        }

        .msg-item{
            background:#fff;padding:15px;border-radius:8px;
            margin-bottom:15px;box-shadow:0 1px 5px #ddd;
        }
        .msg-info{font-size:14px;color:#666;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:5px;}
        .msg-content{font-size:16px;margin-bottom:10px;}
        .del-msg-btn{padding:5px 10px;background:#f56c6c;color:#fff;border:none;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h1>留言墙</h1>

        <div class="login-box" id="loginBox">
            <input type="text" id="inpUser" placeholder="账号">
            <input type="password" id="inpPwd" placeholder="密码">
            <button onclick="login()">登录</button>
        </div>

        <div class="wall-wrap" id="wallBox">
            <button class="logout-btn" onclick="logout()">退出登录</button>

            <div class="admin-panel" id="adminPanel">
                <h3>⚙️ 管理员管理中心</h3>
                <div>
                    <input type="text" id="newU" placeholder="新增账号">
                    <input type="password" id="newP" placeholder="密码">
                    <button onclick="addUser()">添加账号</button>
                </div>
                <div style="margin-top:10px;">
                    <input type="text" id="editU" placeholder="操作账号">
                    <input type="password" id="editP" placeholder="新密码">
                    <button onclick="modifyUser()">修改密码</button>
                    <button onclick="removeUser()" class="admin-del">删除账号</button>
                </div>
                <div id="userListShow" style="margin-top:15px;"></div>
            </div>

            <div class="input-box">
                <textarea id="msgTxt" placeholder="写下留言..."></textarea>
                <button class="send-btn" onclick="sendMsg()">提交留言</button>
            </div>

            <div id="msgList"></div>
        </div>
    </div>

    <script>
        // ====================== 你要的管理员账号 ======================
        const ADMIN_NAME = "管理员";
        const ADMIN_PASS = "CBY888123";
        // ==============================================================

        let userList = [];
        let msgList = [];
        let isAdmin = false;
        let nowLoginUser = "";

        window.onload = function(){
            resetAdmin();  // 强制保证管理员正确
            loadMsg();
        }

        // 强制重置管理员（永远正确，不会密码错）
        function resetAdmin(){
            userList = [{ name:ADMIN_NAME, pwd:ADMIN_PASS, admin:true }];
            localStorage.setItem("userList", JSON.stringify(userList));
        }

        function saveUser(){
            localStorage.setItem("userList", JSON.stringify(userList));
        }

        // ========== 登录 ==========
        function login(){
            let u = document.getElementById("inpUser").value.trim();
            let p = document.getElementById("inpPwd").value.trim();

            // 管理员登录
            if(u === ADMIN_NAME && p === ADMIN_PASS){
                isAdmin = true;
                nowLoginUser = u;
                goHome();
                return;
            }

            // 普通用户登录
            let find = userList.find(x => x.name === u && x.pwd === p);
            if(!find){
                alert("账号或密码错误！");
                return;
            }

            isAdmin = false;
            nowLoginUser = u;
            goHome();
        }

        function goHome(){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("wallBox").style.display = "block";
            
            // ✅ 关键：只有管理员才显示管理面板
            if(isAdmin){
                document.getElementById("adminPanel").style.display = "block";
                renderUserList();
            } else {
                document.getElementById("adminPanel").style.display = "none";
            }
            
            renderMsg();
        }

        function logout(){
            location.reload();
        }

        // ========== 管理员功能 ==========
        function addUser(){
            let u = document.getElementById("newU").value.trim();
            let p = document.getElementById("newP").value.trim();
            if(!u||!p){alert("不能为空");return;}
            if(userList.some(x=>x.name===u)){alert("账号已存在");return;}
            userList.push({name:u,pwd:p,admin:false});
            saveUser();
            alert("添加成功");
            document.getElementById("newU").value="";
            document.getElementById("newP").value="";
            renderUserList();
        }

        function modifyUser(){
            let u = document.getElementById("editU").value.trim();
            let p = document.getElementById("editP").value.trim();
            let item = userList.find(x=>x.name===u);
            if(!item){alert("账号不存在");return;}
            if(item.admin){alert("不能修改管理员");return;}
            item.pwd = p;
            saveUser();
            alert("修改成功");
            renderUserList();
        }

        function removeUser(){
            let u = document.getElementById("editU").value.trim();
            let item = userList.find(x=>x.name===u);
            if(!item){alert("账号不存在");return;}
            if(item.admin){alert("不能删除管理员");return;}
            if(!confirm("确定删除？"))return;
            userList = userList.filter(x=>x.name!==u);
            saveUser();
            alert("删除成功");
            renderUserList();
        }

        function renderUserList(){
            let html = "<h4>📋 所有账号（管理员可见）</h4>";
            userList.forEach(i=>{
                html+=`<div class="user-item">
                    <span>账号：${i.name} ${i.admin?"【管理员】":""}</span>
                    <span>密码：${i.pwd}</span>
                </div>`;
            });
            document.getElementById("userListShow").innerHTML=html;
        }

        // ========== 留言功能 ==========
        function getTime(){
            let d=new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
        }

        function loadMsg(){
            let m=localStorage.getItem("msgList");
            if(m)msgList=JSON.parse(m);
        }
        function saveMsg(){
            localStorage.setItem("msgList",JSON.stringify(msgList));
        }

        function sendMsg(){
            let t=document.getElementById("msgTxt").value.trim();
            if(!t){alert("不能为空");return;}
            msgList.push({user:nowLoginUser,time:getTime(),content:t});
            saveMsg();
            renderMsg();
            document.getElementById("msgTxt").value="";
        }

        function renderMsg(){
            let b=document.getElementById("msgList");
            b.innerHTML="";
            for(let i=msgList.length-1;i>=0;i--){
                let i2=msgList[i];
                let btn=isAdmin?`<button class="del-msg-btn" onclick="delMsg(${i})">删除留言</button>`:"";
                let d=document.createElement("div");
                d.className="msg-item";
                d.innerHTML=`
                    <div class="msg-info">发布人：${i2.user}｜时间：${i2.time}</div>
                    <div class="msg-content">${i2.content}</div>
                    ${btn}
                `;
                b.appendChild(d);
            }
        }

        function delMsg(i){
            if(!confirm("确定删除？"))return;
            msgList.splice(i,1);
            saveMsg();
            renderMsg();
        }
    </script>
</body>
</html>
