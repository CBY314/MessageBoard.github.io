<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录版留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }

        /* 登录框样式 */
        .login-box {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin: 50px auto;
            max-width: 400px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 留言区域 */
        .input-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: none;
        }
        .send-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .msg-item {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 1px 5px #ddd;
        }
        /* 默认隐藏留言区 */
        .wall-wrap {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>留言墙系统</h1>

        <!-- 登录界面 -->
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="请输入账号">
            <input type="password" id="pwd" placeholder="请输入密码">
            <button onclick="login()">登录</button>
        </div>

        <!-- 留言墙界面（登录后才显示） -->
        <div class="wall-wrap" id="wallBox">
            <div class="input-box">
                <textarea id="content" placeholder="在这里写下你的留言..."></textarea>
                <button class="send-btn" onclick="addMsg()">提交留言</button>
            </div>
            <div id="msgList"></div>
        </div>
    </div>

    <script>
        // ========== 在这里改账号密码 ==========
        const USER = "admin";   // 账号
        const PWD  = "123456";  // 密码

        let msgArr = [];

        // 页面打开先判断是否已登录
        window.onload = function(){
            let isLogin = localStorage.getItem("isLogin");
            if(isLogin === "yes"){
                showWall();
            }
            loadMsg();
        }

        // 登录验证
        function login(){
            let un = document.getElementById("username").value.trim();
            let pd = document.getElementById("pwd").value.trim();

            if(un === USER && pd === PWD){
                // 标记已登录
                localStorage.setItem("isLogin","yes");
                showWall();
            }else{
                alert("账号或密码错误！");
            }
        }

        // 显示留言墙、隐藏登录框
        function showWall(){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("wallBox").style.display = "block";
        }

        // 加载留言
        function loadMsg() {
            let old = localStorage.getItem('liuyanData');
            if(old) {
                msgArr = JSON.parse(old);
            }
            renderMsg();
        }

        // 渲染留言
        function renderMsg() {
            let box = document.getElementById('msgList');
            box.innerHTML = "";
            for(let i = msgArr.length - 1; i >= 0; i--){
                let div = document.createElement('div');
                div.className = 'msg-item';
                div.innerText = msgArr[i];
                box.appendChild(div);
            }
        }

        // 添加留言
        function addMsg() {
            let text = document.getElementById('content').value.trim();
            if (text === "") {
                alert('留言不能为空！');
                return;
            }
            msgArr.push(text);
            localStorage.setItem('liuyanData', JSON.stringify(msgArr));
            renderMsg();
            document.getElementById('content').value = "";
        }
    </script>
</body>
</html>
