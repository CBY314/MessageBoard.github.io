<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }
        .input-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: none;
        }
        button {
            margin-top: 15px;
            padding: 10px 30px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #337ecc;
        }
        .msg-item {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 1px 5px #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的留言墙</h1>

        <div class="input-box">
            <textarea id="content" placeholder="在这里写下你的留言..."></textarea>
            <button onclick="addMsg()">提交留言</button>
        </div>

        <div id="msgList"></div>
    </div>

    <script>
        // 存留言的数组
        let msgArr = [];

        // 页面打开时读取本地保存的留言
        function loadMsg() {
            let old = localStorage.getItem('liuyanData');
            if(old) {
                msgArr = JSON.parse(old);
            }
            renderMsg();
        }

        // 渲染所有留言
        function renderMsg() {
            let box = document.getElementById('msgList');
            box.innerHTML = "";
            // 倒序显示，最新的在最上面
            for(let i = msgArr.length - 1; i >= 0; i--){
                let div = document.createElement('div');
                div.className = 'msg-item';
                div.innerText = msgArr[i];
                box.appendChild(div);
            }
        }

        // 添加新留言
        function addMsg() {
            let text = document.getElementById('content').value.trim();
            if (text === "") {
                alert('留言不能为空！');
                return;
            }
            // 加入数组
            msgArr.push(text);
            // 保存到本地
            localStorage.setItem('liuyanData', JSON.stringify(msgArr));
            // 重新渲染
            renderMsg();
            // 清空输入框
            document.getElementById('content').value = "";
        }

        // 页面加载自动读取留言
        loadMsg();
    </script>
</body>
</html>
