<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>留言墙</title>
<style>
body{background:#f0f4f8;font-family:微软雅黑;}
.login{width:350px;margin:80px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 0 8px #ccc;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;}
button{width:100%;padding:12px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.main{display:none;max-width:700px;margin:30px auto;}
.logout{padding:8px 20px;background:#f56c6c;color:#fff;border:none;border-radius:6px;cursor:pointer;}
textarea{width:100%;height:120px;padding:15px;border:1px solid #ddd;border-radius:6px;margin:15px 0;}
.msg{background:#fff;padding:15px;border-radius:8px;margin:10px 0;}
.delBtn{padding:5px 10px;background:#f56c6c;color:#fff;border:none;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>

<div class="login" id="loginBox">
    <input type="text" id="acc" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
</div>

<div class="main" id="mainBox">
    <button class="logout" onclick="location.reload()">退出登录</button>
    <textarea id="liuyan" placeholder="写留言"></textarea>
    <button onclick="faBu()">提交留言</button>
    <div id="list"></div>
</div>

<script>
// 死固定，没有任何加密、没有任何缓存读取
const ACC = "CBY";
const PWD = "CBY888123";

function login(){
    let a = document.getElementById("acc").value.trim();
    let p = document.getElementById("pwd").value.trim();
    
    if(a == ACC && p == PWD){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainBox").style.display = "block";
        loadLiuyan();
    }else{
        alert("账号或密码错误！");
    }
}

let data = [];
function faBu(){
    let txt = document.getElementById("liuyan").value.trim();
    if(!txt)return;
    data.push({txt:txt,time:new Date().toLocaleString()});
    localStorage.setItem("ly",JSON.stringify(data));
    loadLiuyan();
    document.getElementById("liuyan").value = "";
}

function loadLiuyan(){
    let s = localStorage.getItem("ly");
    if(s) data = JSON.parse(s);
    let html = "";
    for(let i=data.length-1;i>=0;i--){
        html += `<div class="msg">
            <div>${data[i].time}</div>
            <div>${data[i].txt}</div>
            <button class="delBtn" onclick="del(${i})">删除留言</button>
        </div>`;
    }
    document.getElementById("list").innerHTML = html;
}

function del(i){
    data.splice(i,1);
    localStorage.setItem("ly",JSON.stringify(data));
    loadLiuyan();
}
</script>

</body>
</html>
