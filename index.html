<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            padding: 40px 20px;
            min-height: 100vh;
            transition: background 1s ease;
        }
        body.style1 {
            background: linear-gradient(-45deg, #a8e6cf, #dcedc1, #ffd3b6, #ffaaa5);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
        }
        body.style2 {
            background: linear-gradient(-45deg, #74b9ff, #a29bfe, #fd79a8, #ffeaa7);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
        }
        body.style3 {
            background: linear-gradient(-45deg, #00b894, #00cec9, #74b9ff, #6c5ce7);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
        }
        body.style4 {
            background: linear-gradient(-45deg, #f8b500, #fc5c65, #fd79a8, #a55eea);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
        }
        body.style5 {
            background: #f0f4f8;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-switch {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 999;
        }
        .bg-switch button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            margin: 3px;
            cursor: pointer;
        }
        .bg1 { background: linear-gradient(45deg, #a8e6cf, #ffaaa5); }
        .bg2 { background: linear-gradient(45deg, #74b9ff, #fd79a8); }
        .bg3 { background: linear-gradient(45deg, #00b894, #6c5ce7); }
        .bg4 { background: linear-gradient(45deg, #f8b500, #a55eea); }
        .bg5 { background: #f0f4f8; }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .notice-bar{
            background:#52c41a;
            color:#fff;
            padding:14px;
            border-radius:12px;
            text-align:center;
            font-size:17px;
            margin-bottom:20px;
            display:none;
        }

        .apply-box{
            background:#fff;
            padding:25px;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.08);
            margin:20px auto;
            max-width:420px;
        }
        .apply-box h3{
            margin-bottom:15px;
            color:#2c3e50;
        }
        .apply-box input{
            width:100%;
            padding:12px 16px;
            margin:8px 0;
            border:1px solid #e1e7f0;
            border-radius:10px;
            font-size:16px;
            background:#f8fafc;
        }
        .apply-box button{
            width:100%;
            padding:12px;
            background:linear-gradient(135deg,#67c23a,#58b02b);
            color:#fff;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin-top:8px;
            font-size:16px;
        }

        .login-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            margin: 60px auto 20px;
            max-width: 420px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 1px solid #e1e7f0;
            border-radius: 10px;
            font-size: 16px;
            background: #f8fafc;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #409eff, #2b8def);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .wall-wrap { display: none; }
        .logout-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #f56c6c, #ee5555);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .admin-panel {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
            margin-bottom: 25px;
            display: none;
        }
        .admin-panel h3, .admin-panel h4 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .admin-panel input {
            padding: 10px 12px;
            margin: 6px 4px;
            border: 1px solid #e1e7f0;
            border-radius: 8px;
            font-size: 15px;
            background: #f8fafc;
        }
        .admin-panel button {
            padding: 10px 14px;
            background: linear-gradient(135deg, #67c23a, #58b02b);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 4px;
        }
        .admin-del {
            background: linear-gradient(135deg, #f56c6c, #ee5555) !important;
        }
        .user-item,.apply-item{
            padding:12px 15px;
            background:#f8fafc;
            margin:8px 0;
            border-radius:10px;
        }
        .apply-item{ background:#fff5e6; }
        .admin-set {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid #eee;
        }

        .input-box {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            height: 110px;
            padding: 16px;
            border: 1px solid #e1e7f0;
            border-radius: 12px;
            resize: none;
            font-size: 16px;
            background: #f8fafc;
        }
        .send-btn {
            margin-top: 18px;
            padding: 12px 35px;
            background: linear-gradient(135deg, #409eff, #2b8def);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .msg-item {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .msg-top {
            border-left: 5px solid #ff6b6b;
            background: #fff7f7;
        }
        .msg-info {
            font-size: 14px;
            color: #777;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .msg-content {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
            line-height: 1.6;
        }
        .del-msg-btn, .top-btn, .move-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 3px;
            font-size: 13px;
        }
        .del-msg-btn { background: #f56c6c; color: #fff; }
        .top-btn { background: #ff9f43; color: #fff; }
        .move-btn { background: #409eff; color: #fff; }
    </style>
</head>
<body class="style1">

<div class="bg-switch">
    <button class="bg1" onclick="setBg('style1')"></button>
    <button class="bg2" onclick="setBg('style2')"></button>
    <button class="bg3" onclick="setBg('style3')"></button>
    <button class="bg4" onclick="setBg('style4')"></button>
    <button class="bg5" onclick="setBg('style5')"></button>
</div>

<div class="container">
    <h1>✨ 留言墙 ✨</h1>

    <div class="notice-bar" id="noticeBar">
        🎉 你的账号申请已通过，可以直接登录！
    </div>

    <div class="login-box" id="loginBox">
        <input type="text" id="inpUser" placeholder="请输入账号">
        <input type="password" id="inpPwd" placeholder="请输入密码">
        <button onclick="login()">立即登录</button>
    </div>

    <div class="apply-box" id="applyBox">
        <h3>📝 申请注册账号</h3>
        <input type="text" id="applyName" placeholder="想要申请的账号名">
        <input type="password" id="applyPwd" placeholder="设置登录密码">
        <button onclick="submitApply()">提交申请，等待管理员审核</button>
    </div>

    <div class="wall-wrap" id="wallBox">
        <button class="logout-btn" onclick="logout()">退出登录</button>

        <div class="admin-panel" id="adminPanel">
            <h3>⚙️ 管理员管理中心</h3>
            <div class="admin-set">
                <h4>📩 账号注册申请审核</h4>
                <div id="applyListShow"></div>
            </div>

            <div class="admin-set">
                <h4>修改管理员账号名</h4>
                <input type="text" id="newAdminName" placeholder="输入新管理员名称">
                <button onclick="changeAdminName()">确认修改</button>
            </div>
            <div>
                <input type="text" id="newU" placeholder="新增账号">
                <input type="password" id="newP" placeholder="密码">
                <button onclick="addUser()">添加账号</button>
            </div>
            <div>
                <input type="text" id="editU" placeholder="操作账号">
                <input type="password" id="editP" placeholder="新密码">
                <button onclick="modifyUser()">修改密码</button>
                <button onclick="removeUser()" class="admin-del">删除账号</button>
            </div>
            <div id="userListShow"></div>
        </div>

        <div class="input-box">
            <textarea id="msgTxt" placeholder="写下你的留言..."></textarea>
            <button class="send-btn" onclick="sendMsg()">提交留言</button>
        </div>

        <div id="msgList"></div>
    </div>
</div>

<script>
    let userList = [];
    let msgList = [];
    let applyList = [];
    let isAdmin = false;
    let nowLoginUser = "";

    window.onload = function(){
        initData();
        loadMsg();
        loadApply();
        loadBg();
        checkNotice();
        setInterval(checkNotice, 1500);
    }

    function setBg(cname){
        document.body.className = cname;
        localStorage.setItem("bgStyle", cname);
    }
    function loadBg(){
        let bg = localStorage.getItem("bgStyle");
        if(bg) document.body.className = bg;
    }

    function loadApply(){
        let old = localStorage.getItem("applyList");
        if(old) applyList = JSON.parse(old);
    }
    function saveApply(){
        localStorage.setItem("applyList", JSON.stringify(applyList));
    }

    // 提交申请
    function submitApply(){
        let name = document.getElementById("applyName").value.trim();
        let pwd = document.getElementById("applyPwd").value.trim();
        if(!name || !pwd){
            alert("账号和密码不能为空");
            return;
        }
        if(userList.some(x=>x.name===name)){
            alert("该账号已存在，无需申请");
            return;
        }
        if(applyList.some(x=>x.name===name)){
            alert("你已提交过该账号申请，请等待管理员审核");
            return;
        }
        applyList.push({name, pwd});
        saveApply();
        alert("申请提交成功！请等待管理员审核通过后登录");
        document.getElementById("applyName").value = "";
        document.getElementById("applyPwd").value = "";
    }

    // 检测全局通过通知
    function checkNotice(){
        let passName = localStorage.getItem("passApplyName");
        if(passName){
            document.getElementById("noticeBar").style.display = "block";
        }else{
            document.getElementById("noticeBar").style.display = "none";
        }
    }

    // 管理员同意
    function passApply(idx){
        let item = applyList[idx];
        userList.push({name:item.name, pwd:item.pwd, admin:false});
        saveUser();

        // 全局写入通过通知
        localStorage.setItem("passApplyName", item.name);

        applyList.splice(idx,1);
        saveApply();
        alert(`已同意！账号【${item.name}】创建成功`);
        renderApplyList();
        renderUserList();
    }

    function refuseApply(idx){
        if(!confirm("确定拒绝该注册申请？")) return;
        applyList.splice(idx,1);
        saveApply();
        alert("已拒绝该申请");
        renderApplyList();
    }

    function initData(){
        let old = localStorage.getItem("userList");
        if(old){
            userList = JSON.parse(old);
        }else{
            userList = [{name:"CBY",pwd:"CBY888123",admin:true}];
            localStorage.setItem("userList", JSON.stringify(userList));
        }
    }
    function saveUser(){
        localStorage.setItem("userList", JSON.stringify(userList));
    }

    function login(){
        let u = document.getElementById("inpUser").value.trim();
        let p = document.getElementById("inpPwd").value.trim();
        for(let i=0;i<userList.length;i++){
            if(userList[i].name === u && userList[i].pwd === p){
                isAdmin = userList[i].admin;
                nowLoginUser = u;
                // 登录成功清除通知
                localStorage.removeItem("passApplyName");
                goHome();
                return;
            }
        }
        alert("账号或密码错误！");
    }

    function goHome(){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("applyBox").style.display = "none";
        document.getElementById("wallBox").style.display = "block";
        if(isAdmin){
            document.getElementById("adminPanel").style.display = "block";
            renderUserList();
            renderApplyList();
        }else{
            document.getElementById("adminPanel").style.display = "none";
        }
        renderMsg();
    }

    function logout(){
        location.reload();
    }

    function changeAdminName(){
        let newName = document.getElementById("newAdminName").value.trim();
        if(!newName){alert("名称不能为空");return;}
        if(userList.some(x => x.name === newName)){alert("账号名已被占用");return;}
        let admin = userList.find(x => x.admin === true);
        if(admin){
            admin.name = newName;
            nowLoginUser = newName;
            saveUser();
            alert("修改成功，请重新登录");
            logout();
        }
    }

    function addUser(){
        let u = document.getElementById("newU").value.trim();
        let p = document.getElementById("newP").value.trim();
        if(!u||!p){alert("账号密码不能为空");return;}
        if(userList.some(x=>x.name===u)){alert("账号已存在");return;}
        userList.push({name:u,pwd:p,admin:false});
        saveUser();
        alert("添加成功，可以直接登录");
        document.getElementById("newU").value="";
        document.getElementById("newP").value="";
        renderUserList();
    }

    function modifyUser(){
        let u = document.getElementById("editU").value.trim();
        let p = document.getElementById("editP").value.trim();
        let item = userList.find(x=>x.name===u);
        if(!item){alert("账号不存在");return;}
        if(item.admin){alert("不能修改管理员");return;}
        item.pwd = p;
        saveUser();
        alert("修改成功");
        renderUserList();
    }

    function removeUser(){
        let u = document.getElementById("editU").value.trim();
        let item = userList.find(x=>x.name===u);
        if(!item){alert("账号不存在");return;}
        if(item.admin){alert("不能删除管理员");return;}
        if(!confirm("确定删除？"))return;
        userList = userList.filter(x=>x.name!==u);
        saveUser();
        alert("删除成功");
        renderUserList();
    }

    function renderUserList(){
        let html = "<h4>📋 所有账号（含密码）</h4>";
        userList.forEach(i=>{
            html+=`<div class="user-item">
                <span>账号：${i.name} ${i.admin?"【管理员】":""}</span>
                <span>密码：${i.pwd}</span>
            </div>`;
        });
        document.getElementById("userListShow").innerHTML=html;
    }

    function renderApplyList(){
        let box = document.getElementById("applyListShow");
        if(applyList.length === 0){
            box.innerHTML = "<div style='padding:8px;color:#999;'>暂无新的注册申请</div>";
            return;
        }
        let html = "";
        applyList.forEach((item, idx)=>{
            html += `
            <div class="apply-item">
                <div>申请账号：${item.name}</div>
                <div>申请密码：${item.pwd}</div>
                <div style="margin-top:5px;">
                    <button onclick="passApply(${idx})">同意创建</button>
                    <button onclick="refuseApply(${idx})" class="admin-del">拒绝</button>
                </div>
            </div>
            `;
        });
        box.innerHTML = html;
    }

    function getTime(){
        let d=new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
    }

    function loadMsg(){
        let m=localStorage.getItem("msgList");
        if(m)msgList=JSON.parse(m);
    }
    function saveMsg(){
        localStorage.setItem("msgList",JSON.stringify(msgList));
    }

    function sendMsg(){
        let t=document.getElementById("msgTxt").value.trim();
        if(!t){alert("留言不能为空");return;}
        msgList.push({user:nowLoginUser,time:getTime(),content:t,isTop:false,topOrder:0});
        saveMsg();
        renderMsg();
        document.getElementById("msgTxt").value="";
    }

    // 恢复置顶、上移、下移
    function toggleTop(idx){
        msgList[idx].isTop = !msgList[idx].isTop;
        if(msgList[idx].isTop){
            let topArr = msgList.filter(m=>m.isTop);
            msgList[idx].topOrder = topArr.length;
        }else{
            msgList[idx].topOrder = 0;
        }
        saveMsg();
        renderMsg();
    }

    function moveUp(idx){
        if(!msgList[idx].isTop) return;
        let currOrder = msgList[idx].topOrder;
        if(currOrder <= 1) return;
        for(let i=0;i<msgList.length;i++){
            if(msgList[i].isTop && msgList[i].topOrder === currOrder - 1){
                let temp = msgList[i].topOrder;
                msgList[i].topOrder = msgList[idx].topOrder;
                msgList[idx].topOrder = temp;
                saveMsg();
                renderMsg();
                return;
            }
        }
    }

    function moveDown(idx){
        if(!msgList[idx].isTop) return;
        let currOrder = msgList[idx].topOrder;
        let topArr = msgList.filter(m=>m.isTop);
        if(currOrder >= topArr.length) return;
        for(let i=0;i<msgList.length;i++){
            if(msgList[i].isTop && msgList[i].topOrder === currOrder + 1){
                let temp = msgList[i].topOrder;
                msgList[i].topOrder = msgList[idx].topOrder;
                msgList[idx].topOrder = temp;
                saveMsg();
                renderMsg();
                return;
            }
        }
    }

    function delMsg(i){
        if(!confirm("确定删除？"))return;
        msgList.splice(i,1);
        saveMsg();
        renderMsg();
    }

    function renderMsg(){
        let b=document.getElementById("msgList");
        b.innerHTML="";
        let topMsgs = msgList.filter(m=>m.isTop).sort((a,b)=>a.topOrder - b.topOrder);
        let normalMsgs = msgList.filter(m=>!m.isTop).reverse();

        topMsgs.forEach((item)=>{
            let idx = msgList.findIndex(m=>m.user===item.user && m.time===item.time && m.content===item.content);
            renderOneMsg(idx,true);
        });
        normalMsgs.forEach((item)=>{
            let idx = msgList.findIndex(m=>m.user===item.user && m.time===item.time && m.content===item.content);
            renderOneMsg(idx,false);
        });
    }

    function renderOneMsg(idx,isTop){
        let i2 = msgList[idx];
        let d=document.createElement("div");
        d.className="msg-item" + (isTop ? " msg-top" : "");

        let btnHtml = "";
        if(isAdmin){
            btnHtml += `<button class="top-btn" onclick="toggleTop(${idx})">${isTop?'取消置顶':'置顶'}</button>`;
            if(isTop){
                btnHtml += `<button class="move-btn" onclick="moveUp(${idx})">上移</button>`;
                btnHtml += `<button class="move-btn" onclick="moveDown(${idx})">下移</button>`;
            }
            btnHtml += `<button class="del-msg-btn" onclick="delMsg(${idx})">删除</button>`;
        }else{
            if(i2.user === nowLoginUser){
                btnHtml += `<button class="del-msg-btn" onclick="delMsg(${idx})">删除</button>`;
            }
        }

        d.innerHTML=`
            <div class="msg-info">${isTop?'📌 置顶｜':''}发布人：${i2.user}｜时间：${i2.time}</div>
            <div class="msg-content">${i2.content}</div>
            ${btnHtml}
        `;
        document.getElementById("msgList").appendChild(d);
    }
</script>
</body>
</html>
