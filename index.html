<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }
        .input-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: none;
        }
        button {
            margin-top: 15px;
            padding: 10px 30px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #337ecc;
        }
        .msg-item {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 1px 5px #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的留言墙</h1>

        <!-- 留言输入区域 -->
        <div class="input-box">
            <textarea id="content" placeholder="在这里写下你的留言..."></textarea>
            <button onclick="addMsg()">提交留言</button>
        </div>

        <!-- 留言展示区域 -->
        <div id="msgList"></div>
    </div>

    <script>
        // 提交留言
        function addMsg() {
            // 获取输入框内容
            let text = document.getElementById('content').value.trim();
            if (text === "") {
                alert('留言不能为空！');
                return;
            }

            // 创建一条留言标签
            let msgDiv = document.createElement('div');
            msgDiv.className = 'msg-item';
            msgDiv.innerText = text;

            // 添加到留言列表最前面
            document.getElementById('msgList').prepend(msgDiv);

            // 清空输入框
            document.getElementById('content').value = "";
        }
    </script>
</body>
</html>
