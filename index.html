<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }
        .login-box {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin: 50px auto;
            max-width: 400px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .input-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ccc;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: none;
        }
        .send-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .msg-item {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 1px 5px #ddd;
        }
        .wall-wrap {
            display: none;
        }
        .logout-btn {
            margin-bottom: 20px;
            padding: 8px 20px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>留言墙</h1>

        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="请输入账号">
            <input type="password" id="pwd" placeholder="请输入密码">
            <button onclick="login()">登录</button>
        </div>

        <div class="wall-wrap" id="wallBox">
            <button class="logout-btn" onclick="logout()">退出登录</button>
            <div class="input-box">
                <textarea id="content" placeholder="在这里写下你的留言..."></textarea>
                <button class="send-btn" onclick="addMsg()">提交留言</button>
            </div>
            <div id="msgList"></div>
        </div>
    </div>

    <script>
        // ========== 在这里随便添加多个账号 ==========
        const userList = [
            {name:"zhangsan", pwd:"123456"},
            {name:"lisi", pwd:"654321"},
            {name:"admin", pwd:"888888"}
        ];

        let msgArr = [];

        window.onload = function(){
            let isLogin = localStorage.getItem("isLogin");
            if(isLogin === "yes"){
                showWall();
            }
            loadMsg();
        }

        function login(){
            let un = document.getElementById("username").value.trim();
            let pd = document.getElementById("pwd").value.trim();
            // 遍历匹配多个账号
            let ok = userList.some(item => item.name === un && item.pwd === pd);
            if(ok){
                localStorage.setItem("isLogin","yes");
                showWall();
            }else{
                alert("账号或密码错误！");
            }
        }

        function logout(){
            localStorage.removeItem("isLogin");
            document.getElementById("wallBox").style.display = "none";
            document.getElementById("loginBox").style.display = "block";
            // 清空输入
            document.getElementById("username").value = "";
            document.getElementById("pwd").value = "";
        }

        function showWall(){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("wallBox").style.display = "block";
        }

        function loadMsg() {
            let old = localStorage.getItem('liuyanData');
            if(old) {
                msgArr = JSON.parse(old);
            }
            renderMsg();
        }

        function renderMsg() {
            let box = document.getElementById('msgList');
            box.innerHTML = "";
            for(let i = msgArr.length - 1; i >= 0; i--){
                let div = document.createElement('div');
                div.className = 'msg-item';
                div.innerText = msgArr[i];
                box.appendChild(div);
            }
        }

        function addMsg() {
            let text = document.getElementById('content').value.trim();
            if (text === "") {
                alert('留言不能为空！');
                return;
            }
            msgArr.push(text);
            localStorage.setItem('liuyanData', JSON.stringify(msgArr));
            renderMsg();
            document.getElementById('content').value = "";
        }
    </script>
</body>
</html>
