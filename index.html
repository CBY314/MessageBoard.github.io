<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留言墙</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body {background:#f0f4f8;padding:30px;}
        .container {max-width:700px;margin:0 auto;}
        h1 {text-align:center;color:#222;margin-bottom:30px;}
        .login-box {background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin:50px auto;max-width:400px;}
        .login-box input {width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        .login-box button {width:100%;padding:12px;background:#409eff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:10px;}
        .input-box {background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin-bottom:20px;}
        textarea {width:100%;height:100px;padding:15px;border:1px solid #ddd;border-radius:6px;font-size:16px;resize:none;}
        .send-btn {margin-top:15px;padding:10px 30px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .wall-wrap {display:none;}
        .logout-btn {margin-bottom:20px;padding:8px 20px;background:#f56c6c;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .admin-panel {background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px #ccc;margin-bottom:20px;display:none;}
        .admin-panel input {padding:8px;margin:5px;border:1px solid #ddd;border-radius:4px;}
        .admin-panel button {padding:8px 15px;background:#67c23a;color:#fff;border:none;border-radius:4px;cursor:pointer;margin:5px;}
        .admin-del {background:#f56c6c;}
        .user-item {padding:10px;background:#f8f9fa;margin:6px 0;border-radius:4px;display:flex;justify-content:space-between;}
        .msg-item {background:#fff;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 1px 5px #ddd;}
        .msg-top {font-size:14px;color:#666;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:5px;}
        .msg-txt {font-size:16px;color:#333;margin-bottom:10px;}
        .del-msg {padding:5px 12px;background:#f56c6c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>留言墙</h1>
        <div class="login-box" id="loginBox">
            <input type="text" id="acc" placeholder="输入账号">
            <input type="password" id="pwd" placeholder="输入密码">
            <button onclick="login()">登录</button>
        </div>

        <div class="wall-wrap" id="wallBox">
            <button class="logout-btn" onclick="logout()">退出登录</button>

            <div class="admin-panel" id="adminPanel">
                <h3>管理员账户管理</h3>
                <div>
                    <input type="text" id="newAcc" placeholder="新账号">
                    <input type="password" id="newPwd" placeholder="新密码">
                    <button onclick="addUser()">添加账号</button>
                </div>
                <div style="margin-top:10px">
                    <input type="text" id="editAcc" placeholder="要修改的账号">
                    <input type="password" id="editPwd" placeholder="新密码">
                    <button onclick="modifyPwd()">改密码</button>
                    <button onclick="delUser()" class="admin-del">删账号</button>
                </div>
                <div id="userList" style="margin-top:15px"></div>
            </div>

            <div class="input-box">
                <textarea id="msgContent" placeholder="写下你的留言..."></textarea>
                <button class="send-btn" onclick="submitMsg()">提交留言</button>
            </div>

            <div id="msgList"></div>
        </div>
    </div>

    <script>
        // 固定管理员账号密码
        const ADMIN_ACC = "CBY314";
        const ADMIN_PWD = "CBY888123";

        let userArr = [];
        let msgArr = [];
        let isAdmin = false;
        let nowUser = "";

        // 初始化
        window.onload = function(){
            initData();
            loadMsgData();
        }

        // 初始化管理员，无数据才创建
        function initData(){
            let data = localStorage.getItem("userArr");
            if(!data){
                userArr = [{acc:ADMIN_ACC,pwd:ADMIN_PWD,admin:true}];
                localStorage.setItem("userArr",JSON.stringify(userArr));
            }else{
                userArr = JSON.parse(data);
            }
        }

        // 保存用户
        function saveUser(){
            localStorage.setItem("userArr",JSON.stringify(userArr));
        }

        // 登录
        function login(){
            let acc = document.getElementById("acc").value.trim();
            let pwd = document.getElementById("pwd").value.trim();
            let find = userArr.find(x=>x.acc===acc&&x.pwd===pwd);
            if(!find){
                alert("密码错误！");
                return;
            }
            nowUser = acc;
            isAdmin = !!find.admin;
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("wallBox").style.display = "block";
            if(isAdmin){
                document.getElementById("adminPanel").style.display = "block";
                showUserList();
            }
            renderMsg();
        }

        // 退出
        function logout(){
            document.getElementById("wallBox").style.display = "none";
            document.getElementById("loginBox").style.display = "block";
            document.getElementById("acc").value = "";
            document.getElementById("pwd").value = "";
            document.getElementById("adminPanel").style.display = "none";
            isAdmin = false;
            nowUser = "";
        }

        // 管理员添加账号
        function addUser(){
            let acc = document.getElementById("newAcc").value.trim();
            let pwd = document.getElementById("newPwd").value.trim();
            if(!acc||!pwd){alert("账号密码不能为空");return;}
            if(userArr.find(x=>x.acc===acc)){alert("账号已存在");return;}
            userArr.push({acc:acc,pwd:pwd,admin:false});
            saveUser();
            alert("添加成功");
            document.getElementById("newAcc").value = "";
            document.getElementById("newPwd").value = "";
            showUserList();
        }

        // 管理员改密码
        function modifyPwd(){
            let acc = document.getElementById("editAcc").value.trim();
            let newPwd = document.getElementById("editPwd").value.trim();
            if(!acc||!newPwd){alert("请输入账号和新密码");return;}
            let item = userArr.find(x=>x.acc===acc);
            if(!item){alert("账号不存在");return;}
            if(item.admin){alert("管理员禁止修改");return;}
            item.pwd = newPwd;
            saveUser();
            alert("修改成功");
            showUserList();
        }

        // 管理员删账号
        function delUser(){
            let acc = document.getElementById("editAcc").value.trim();
            if(!acc){alert("请输入账号");return;}
            let item = userArr.find(x=>x.acc===acc);
            if(!item){alert("账号不存在");return;}
            if(item.admin){alert("管理员不能删除");return;}
            if(!confirm("确定删除？"))return;
            userArr = userArr.filter(x=>x.acc!==acc);
            saveUser();
            alert("删除成功");
            showUserList();
        }

        // 管理员查看所有账号+明文密码
        function showUserList(){
            let html = "<h4>所有账号（含密码）</h4>";
            userArr.forEach(item=>{
                html += `<div class="user-item">
                    <span>账号：${item.acc} ${item.admin?'【管理员】':''}</span>
                    <span>密码：${item.pwd}</span>
                </div>`;
            });
            document.getElementById("userList").innerHTML = html;
        }

        // 获取时间
        function getTime(){
            let d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
        }

        // 加载留言
        function loadMsgData(){
            let m = localStorage.getItem("msgArr");
            if(m) msgArr = JSON.parse(m);
        }

        // 保存留言
        function saveMsg(){
            localStorage.setItem("msgArr",JSON.stringify(msgArr));
        }

        // 发布留言
        function submitMsg(){
            let txt = document.getElementById("msgContent").value.trim();
            if(!txt){alert("留言不能为空");return;}
            msgArr.push({user:nowUser,time:getTime(),content:txt});
            saveMsg();
            renderMsg();
            document.getElementById("msgContent").value = "";
        }

        // 渲染留言 管理员带删除按钮
        function renderMsg(){
            let box = document.getElementById("msgList");
            box.innerHTML = "";
            for(let i=msgArr.length-1;i>=0;i--){
                let m = msgArr[i];
                let btn = isAdmin ? `<button class="del-msg" onclick="delMsg(${i})">删除留言</button>` : "";
                let div = document.createElement("div");
                div.className = "msg-item";
                div.innerHTML = `
                    <div class="msg-top">发布人：${m.user} ｜ 时间：${m.time}</div>
                    <div class="msg-txt">${m.content}</div>
                    ${btn}
                `;
                box.appendChild(div);
            }
        }

        // 删除留言
        function delMsg(idx){
            if(!confirm("确定删除这条留言？"))return;
            msgArr.splice(idx,1);
            saveMsg();
            renderMsg();
        }
    </script>
</body>
</html>
